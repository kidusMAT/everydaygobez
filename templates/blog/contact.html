{% extends 'blog/base.html' %}

{% block title %}Contact Us | Everyday Gobez{% endblock %}

{% block content %}
<div class="auth-section-container form-section-container">
    <div class="auth-card glass-panel post-form-card">
        <div class="auth-header">
            <span class="auth-emoji">✉️</span>
            <h2>Get In Touch</h2>
            <p>Have an inquiry, feedback, or a partnership suggestion? Send us a message and the Gobez team will get back to you shortly.</p>
        </div>

        <form method="POST" action="{% url 'contact_us' %}" class="auth-form">
            {% csrf_token %}
            
            <!-- Anti-Spam Honeypot Field (hidden from users, bots will fill it) -->
            <div style="display: none;" aria-hidden="true">
                <label for="website_url_honey">Leave this field blank if you are human:</label>
                <input type="text" name="website_url_honey" id="website_url_honey" tabindex="-1" autocomplete="off">
            </div>
            
            <div class="form-group-floating mb-4">
                <input type="text" name="name" id="name" placeholder=" " required>
                <label for="name"><i class="fa-regular fa-user"></i> Your Name</label>
                <div class="input-focus-line"></div>
            </div>

            <div class="form-group-floating mb-4">
                <input type="email" name="email" id="email" placeholder=" " required>
                <label for="email"><i class="fa-regular fa-envelope"></i> Email Address</label>
                <div class="input-focus-line"></div>
            </div>

            <div class="form-group-floating mb-4">
                <input type="text" name="subject" id="subject" placeholder=" " required>
                <label for="subject"><i class="fa-solid fa-circle-info"></i> Subject</label>
                <div class="input-focus-line"></div>
            </div>

            <div class="form-group-floating textarea-group mb-4">
                <textarea name="message" id="message" placeholder=" " rows="6" required></textarea>
                <label for="message"><i class="fa-regular fa-message"></i> How can we help you?</label>
                <div class="input-focus-line"></div>
            </div>

            <div class="editor-buttons-row">
                <a href="{% url 'post_list' %}" class="btn-editor-cancel">
                    Back to Feed
                </a>
                <button type="submit" class="btn-editor-submit">
                    <i class="fa-solid fa-paper-plane"></i> Send Message
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
